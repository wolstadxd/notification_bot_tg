name: CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
          platforms: linux/amd64

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        environment: [Corytech, Finteca]

    environment: ${{ matrix.environment }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            DEPLOY_DIR=~/notification_bot_tg/${{ matrix.environment }}
            mkdir -p "$DEPLOY_DIR/data"
            cd "$DEPLOY_DIR"

            cat > .env << 'ENVFILE'
            BOT_TOKEN=${{ secrets.BOT_TOKEN }}
            ENVFILE

            cat > docker-compose.yml << 'COMPOSE'
            services:
              bot:
                image: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
                container_name: notification_bot_tg_${{ matrix.environment }}
                restart: unless-stopped
                env_file:
                  - .env
                volumes:
                  - ./data:/app/data
            COMPOSE

            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f
